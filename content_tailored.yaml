profile: >
  Driven by the ambition to move businesses and societies in a sustainable direction. Currently completing an M.Arch. in Architecture Computation at The Royal Danish Academy, with hands-on experience in human rights due diligence, double materiality assessments, and responsible business conduct advisory. Cross-sector background spanning infrastructure consulting, real estate development, and computational urban analysis supports an integrated approach to the green transition and resilient societies.

