    org: "The Royal Danish Academy"
    location: "Copenhagen, DK"
    bullets:
      - "Developed a computational framework to identify underused spaces in the historic city center of São Paulo, Brazil, combining urban morphology analysis, land use data, and social vulnerability indicators."
      - "Built an algorithm that uses urban data, including building typology, use patterns, regulatory conditions, and building use, to generate programmatic and morphological typologies for urban intensification, aligned with the city's existing urban policies."
      - "Integrated multiple geospatial datasets in QGIS to map spatial relationships between buildings, zoning conditions, and social context at the neighborhood scale."

  - name: "Real Estate Development Recommendation Tool"
    org: "The Royal Danish Academy"
    location: "Copenhagen, DK"
    bullets:
