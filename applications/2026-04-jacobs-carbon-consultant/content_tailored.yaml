projects:
  - name: "Master's Thesis, Computational Urban Analysis for Intensification Strategy"
    org: "The Royal Danish Academy"
    location: "Copenhagen, DK"
    bullets:
      - "Developed a computational framework combining urban morphology analysis, land use data, and social vulnerability indicators to identify underused spaces and assess development potential."
      - "Integrated multiple geospatial datasets in QGIS to map spatial relationships between buildings, zoning conditions, and social context at the neighborhood scale."

  - name: "Real Estate Development Recommendation Tool"
    org: "The Royal Danish Academy"
    location: "Copenhagen, DK"
    bullets:
      - "Built a machine learning tool generating site-specific development recommendations by integrating financial, social, sustainability, and geospatial data."
      - "Designed a user interface allowing stakeholders to adjust ESG impact drivers and weighting, with predictive outputs aligned to local development conditions and sustainability priorities."

  - name: "Rammed Blue Biomass & Computational Optimization"
    org: "The Royal Danish Academy"
    location: "Copenhagen, DK"
    bullets:
      - "Developed a new construction technique using blue biomass (seashells and algae), applying LCA metrics and parametric simulations to evaluate carbon performance, structural behavior, and environmental impact."
      - "Integrated life cycle assessment methods with computational optimization to identify configurations that minimized environmental load while meeting structural requirements."
      - "Project was selected as a semester highlight and served as the material foundation for the school's installation at the Venice Architecture Biennale 2025, presented in collaboration with CITA, GXN, and 3XN at the Arsenale."

  - name: "Venice Architecture Biennale 2025"
    org: "The Royal Danish Academy, CITA, GXN, 3XN"
    location: "Venice, IT"
    bullets:
      - "Contributed to the Matanzas panel by developing geospatial mappings to analyze local material sources and supply flows, producing cartographic work that informed the site's material research."
      - "Contributed to the Veneto panel by producing the physical exhibition panels displayed in the 7-metre installation at the Arsenale, which used the blue biomass composite technique developed during the semester project."
