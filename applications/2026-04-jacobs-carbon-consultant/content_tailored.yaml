profile: >
  A sustainability professional with a built-environment foundation, combining consulting experience in ESG due diligence and CSRD-aligned assessments with technical work in life cycle analysis and environmental performance. Master's research at The Royal Danish Academy applied LCA metrics to blue bio-based construction materials, linking carbon outcomes to structural optimization and material sourcing. Focused on building expertise in carbon accounting and decarbonisation strategy within a data-driven consulting environment.

